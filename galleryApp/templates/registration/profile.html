{% extends 'base.html' %}
{% block title %}My Profile{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <h2 class="mb-4">My Profile</h2>

        <div class="card mb-4">
            <div class="card-body d-flex align-items-center">
                {% if request.user.profile.profile_picture %}
                    <img src="{{ request.user.profile.profile_picture.url }}"
                         alt="Profile picture"
                         class="rounded-circle me-3"
                         style="width: 80px; height: 80px; object-fit: cover;">
                {% else %}
                    <i class="bi bi-person-circle me-3" style="font-size: 80px;"></i>
                {% endif %}
                <div>
                    <h5 class="mb-0">{{ request.user.username }}</h5>
                    <small class="text-muted">{{ request.user.email }}</small>
                </div>
            </div>
        </div>

        <form method="post" enctype="multipart/form-data">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit" class="btn btn-primary">Save Changes</button>
        </form>

        <hr class="my-4">

        <a href="{% url 'password_change' %}" class="btn btn-outline-secondary btn-sm">Change Password</a>
    </div>
</div>
{% endblock %}
