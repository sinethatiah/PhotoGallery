{% extends 'base.html' %}

{% block title %}Register - Photo Gallery{% endblock %}

{% block content %}
    <h1 class="text-2xl font-bold mb-4">Create an account</h1>

    <form method="post" class="max-w-sm space-y-4">
        {% csrf_token %}

        {% for field in form %}
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">{{ field.label }}</label>
                {{ field }}
                {% for error in field.errors %}
                    <p class="text-red-600 text-sm mt-1">{{ error }}</p>
                {% endfor %}
            </div>
        {% endfor %}

        <button type="submit" class="bg-slate-800 text-white px-4 py-2 rounded hover:bg-slate-700">
            Register
        </button>
    </form>

    <p class="mt-4 text-sm text-gray-600">
        Already have an account? <a href="{% url 'login' %}" class="text-blue-600 hover:underline">Login</a>
    </p>
{% endblock %}
